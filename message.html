<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message | Zhili Yang</title>
    <meta name="description" content="Leave a message for Zhili Yang." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="detail-shell">
      <section class="glass-card detail-card message-page">
        <a class="back-link" href="index.html" aria-label="Back to home">← Home</a>
        <p class="section-label">MESSAGE</p>
        <h1>Message</h1>
        <form class="message-form" id="messageForm">
          <label>
            <span>Name</span>
            <input id="messageName" name="name" type="text" autocomplete="name" />
          </label>
          <label>
            <span>Contact</span>
            <input id="messageContact" name="contact" type="text" autocomplete="email" />
          </label>
          <label>
            <span>Message</span>
            <textarea id="messageBody" name="message" rows="6" required></textarea>
          </label>
          <button class="form-button" type="submit">Send Email</button>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
